# Solar Vampire Relay ESPHome Component
# This component controls a solid-state relay based on SolarVampire sensor data

# Basic ESPHome configuration
esphome:
  name: solar_vampire_relay
  platform: ESP8266
  board: d1_mini

# WiFi connection
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot in case WiFi connection fails
  ap:
    ssid: "SolarVampireRelay Fallback"
    password: !secret fallback_password

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# Enable OTA updates
ota:
  password: !secret ota_password

# Enable logging
logger:

# Web server for status and control
web_server:
  port: 80

# Define the solid-state relay output
output:
  - platform: esp8266_pwm
    id: relay_output
    pin: D1
    frequency: 1000Hz  # 1kHz PWM frequency

# Define a custom PWM light to control the relay
light:
  - platform: monochromatic
    name: "Solar Vampire Relay"
    output: relay_output
    id: relay_light
    restore_mode: ALWAYS_OFF  # Start with relay off

# Sensors to monitor
sensor:
  # Sensor to receive untapped potential from Home Assistant
  - platform: homeassistant
    id: untapped_potential
    entity_id: sensor.solarvampire_excess_1
    name: "Untapped Potential"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    
  # Sensor to receive maximum power from Home Assistant
  - platform: homeassistant
    id: max_power
    entity_id: sensor.solarvampire_max_power_1
    name: "Max Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    
  # Calculate percentage of untapped potential
  - platform: template
    id: untapped_percentage
    name: "Untapped Percentage"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      if (id(max_power).state > 0) {
        return (id(untapped_potential).state / id(max_power).state) * 100.0;
      } else {
        return 0.0;
      }

# Switch for mode selection
select:
  - platform: template
    name: "Relay Mode"
    id: relay_mode
    options:
      - "Off"
      - "On"
      - "Proportional"
    initial_option: "Off"
    optimistic: true
    on_value:
      then:
        - script.execute: update_relay

# Script to update relay based on mode and untapped potential
script:
  - id: update_relay
    then:
      - lambda: |-
          std::string mode = id(relay_mode).state;
          if (mode == "Off") {
            // Turn off relay
            id(relay_light).turn_off();
          } else if (mode == "On") {
            // Turn on relay at full power
            id(relay_light).turn_on();
            id(relay_light).set_brightness(1.0);
          } else if (mode == "Proportional") {
            // Set relay power proportional to untapped percentage
            float percentage = id(untapped_percentage).state;
            if (percentage > 5.0) {  // Only activate if more than 5% untapped potential
              float brightness = constrain(percentage / 100.0, 0.0, 1.0);
              id(relay_light).turn_on();
              id(relay_light).set_brightness(brightness);
            } else {
              id(relay_light).turn_off();
            }
          }

# Automation to update relay every 10 seconds in proportional mode
interval:
  - interval: 10s
    then:
      - if:
          condition:
            lambda: 'return id(relay_mode).state == "Proportional";'
          then:
            - script.execute: update_relay

# Text sensor to display current status
text_sensor:
  - platform: template
    name: "Relay Status"
    lambda: |-
      std::string mode = id(relay_mode).state;
      if (mode == "Off") {
        return "Off";
      } else if (mode == "On") {
        return "On (100%)";
      } else if (mode == "Proportional") {
        float percentage = id(untapped_percentage).state;
        char buffer[32];
        sprintf(buffer, "Proportional (%.1f%%)", percentage);
        return buffer;
      }
      return "Unknown";
    update_interval: 5s
