name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Validate manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(python -c "import json; print(json.load(open('custom_components/sun_allocator/manifest.json'))['version'])")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "ERROR: tag $TAG != manifest $MANIFEST"
            exit 1
          fi

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            index($0, "## [" v "]")==1 {flag=1; next}
            /^## \[/ {if (flag) exit}
            flag {print}
          ' CHANGELOG.md > release_notes.md
          test -s release_notes.md || echo "(no CHANGELOG section for $VERSION)" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          generate_release_notes: true
