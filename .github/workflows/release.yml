name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(python -c "import json; print(json.load(open('custom_components/sun_allocator/manifest.json'))['version'])")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "ERROR: tag $TAG != manifest $MANIFEST"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
