name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What are you trying to accomplish? Describe the real-world scenario.
    validations:
      required: true

  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: How would you like SunAllocator to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, automations you've written, etc.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Sensor / data exposure
        - Allocation strategy
        - Schedule / time logic
        - Climate / HVAC handling
        - ESPHome integration
        - Config / options flow
        - Lovelace / UX
        - Other
    validations:
      required: true

  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues to confirm this hasn't been requested.
          required: true
