template:
  - sensor:
      - name: "SunAllocator Untapped Potential"
        state: "{{ states('sensor.sunallocator_excess_1') }}"
        unit_of_measurement: "W"
      - name: "SunAllocator Max Power"
        state: "{{ states('sensor.sunallocator_max_power_1') }}"
        unit_of_measurement: "W"
      - name: "SunAllocator PV Usage"
        state: "{{ states('sensor.sunallocator_usage_percent_1') }}"
        unit_of_measurement: "%"
      - name: "SunAllocator PV Power"
        state: "{{ state_attr('sensor.sunallocator_excess_1', 'pv_power') }}"
        unit_of_measurement: "W"
      - name: "SunAllocator PV Voltage"
        state: "{{ state_attr('sensor.sunallocator_excess_1', 'pv_voltage') }}"
        unit_of_measurement: "V"
      - name: "SunAllocator Consumption"
        state: "{{ state_attr('sensor.sunallocator_excess_1', 'consumption') }}"
        unit_of_measurement: "W"
      - name: "SunAllocator Excess Possible"
        state: "{{ state_attr('sensor.sunallocator_excess_1', 'excess_possible') }}"
      - name: "SunAllocator Panel Configuration"
        state: "{{ state_attr('sensor.sunallocator_excess_1', 'panel_configuration') }}"
      - name: "SunAllocator Current Max Power"
        state: "{{ state_attr('sensor.sunallocator_excess_1', 'current_max_power') }}"
        unit_of_measurement: "W"
