template:
  - sensor:
      - name: "SolarVampire Untapped Potential"
        state: "{{ states('sensor.solarvampire_excess_1') }}"
        unit_of_measurement: "W"
      - name: "SolarVampire Max Power"
        state: "{{ states('sensor.solarvampire_max_power_1') }}"
        unit_of_measurement: "W"
      - name: "SolarVampire PV Usage"
        state: "{{ states('sensor.solarvampire_usage_percent_1') }}"
        unit_of_measurement: "%"
      - name: "SolarVampire PV Power"
        state: "{{ state_attr('sensor.solarvampire_excess_1', 'pv_power') }}"
        unit_of_measurement: "W"
      - name: "SolarVampire PV Voltage"
        state: "{{ state_attr('sensor.solarvampire_excess_1', 'pv_voltage') }}"
        unit_of_measurement: "V"
      - name: "SolarVampire Consumption"
        state: "{{ state_attr('sensor.solarvampire_excess_1', 'consumption') }}"
        unit_of_measurement: "W"
      - name: "SolarVampire Excess Possible"
        state: "{{ state_attr('sensor.solarvampire_excess_1', 'excess_possible') }}"
      - name: "SolarVampire Panel Configuration"
        state: "{{ state_attr('sensor.solarvampire_excess_1', 'panel_configuration') }}"
      - name: "SolarVampire Current Max Power"
        state: "{{ state_attr('sensor.solarvampire_excess_1', 'current_max_power') }}"
        unit_of_measurement: "W"
