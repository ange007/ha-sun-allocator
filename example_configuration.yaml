# SolarVampire Configuration - DEPRECATED
#
# ⚠️  IMPORTANT NOTICE ⚠️
# 
# This YAML configuration method is NO LONGER SUPPORTED!
# 
# SolarVampire now uses a modern Config Flow interface for easy setup
# through the Home Assistant web interface.
#
# HOW TO CONFIGURE SOLARVAMPIRE:
# 
# 1. Install the integration by copying custom_components/solarvampire 
#    to your config/custom_components folder
# 2. Restart Home Assistant
# 3. Go to Settings → Devices & Services
# 4. Click "+ ADD INTEGRATION"
# 5. Search for "SolarVampire" and select it
# 6. Follow the configuration wizard to set up your solar panels and devices
#
# BENEFITS OF THE NEW CONFIG FLOW:
# - No YAML editing required
# - Easy-to-use graphical interface
# - Multiple device support with priorities
# - Scheduling support for time-based control
# - Real-time validation and error checking
# - Easy reconfiguration through the "CONFIGURE" button
#
# For more information, see the README.md file.
